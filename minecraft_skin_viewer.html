
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #app { min-height: 600px; padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

  .title-block { text-align: center; }
  .title-block h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.3px; }
  .title-block p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

  .search-row { display: flex; gap: 10px; width: 100%; max-width: 420px; }
  .search-row input { flex: 1; padding: 0 14px; height: 42px; font-size: 15px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; transition: border-color 0.15s; }
  .search-row input:focus { border-color: var(--color-border-primary); }
  .search-row button { padding: 0 20px; height: 42px; font-size: 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; }
  .search-row button:hover { background: var(--color-background-tertiary); }
  .search-row button:active { transform: scale(0.97); }

  .stage { width: 320px; height: 400px; position: relative; display: flex; align-items: center; justify-content: center; }
  .error-msg { font-size: 14px; color: var(--color-text-danger, #c0392b); text-align: center; }
  .loading-dots { display: flex; gap: 8px; align-items: center; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-text-secondary); animation: bounce 0.9s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }

  canvas#skin { image-rendering: pixelated; display: block; }

  .info-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 20px; width: 100%; max-width: 320px; display: none; }
  .info-card .ign { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
  .info-card .uuid { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; word-break: break-all; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; display: none; }
  .actions button { padding: 6px 14px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
  .actions button:hover { background: var(--color-background-tertiary); }
  .actions button.active { border-color: var(--color-border-primary); background: var(--color-background-primary); }

  .particles-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
</style>

<div id="app">
  <div class="title-block">
    <h1>Minecraft Skin Viewer</h1>
    <p>Entre un pseudo pour voir le skin animé du joueur</p>
  </div>

  <div class="search-row">
    <input id="usernameInput" type="text" placeholder="Ex: Notch, Dream, Technoblade..." maxlength="16" />
    <button id="searchBtn">Rechercher</button>
  </div>

  <div class="stage" id="stage">
    <div class="loading-dots" id="loadingDots" style="display:none">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <p class="error-msg" id="errorMsg" style="display:none"></p>
    <canvas id="particles" class="particles-canvas" width="320" height="400"></canvas>
    <canvas id="skin" width="180" height="330" style="display:none"></canvas>
  </div>

  <div class="info-card" id="infoCard">
    <div class="ign" id="playerName"></div>
    <div class="uuid" id="playerUUID"></div>
  </div>

  <div class="actions" id="actionBtns">
    <button id="btnWalk" class="active">Marche</button>
    <button id="btnIdle">Repos</button>
    <button id="btnRun">Course</button>
    <button id="btnSpin">Rotation</button>
  </div>
</div>

<script>
const PROXY = "https://api.allorigins.win/get?url=";
const CORS = (url) => PROXY + encodeURIComponent(url);

const canvas = document.getElementById("skin");
const ctx = canvas.getContext("2d");
const pCanvas = document.getElementById("particles");
const pCtx = pCanvas.getContext("2d");
const stage = document.getElementById("stage");
const loadingDots = document.getElementById("loadingDots");
const errorMsg = document.getElementById("errorMsg");
const infoCard = document.getElementById("infoCard");
const actionBtns = document.getElementById("actionBtns");

let skinImg = null;
let animMode = "walk";
let animFrame = 0;
let animT = 0;
let particles = [];
let spinAngle = 0;
let animRAF = null;

const SCALE = 4;
const W = 64, H = 64;

function showLoading(b) { loadingDots.style.display = b ? "flex" : "none"; }
function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = "block"; }
function hideError() { errorMsg.style.display = "none"; }

function resetUI() {
  hideError();
  canvas.style.display = "none";
  infoCard.style.display = "none";
  actionBtns.style.display = "none";
  particles = [];
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
}

async function searchPlayer(name) {
  if (!name.trim()) return;
  resetUI();
  showLoading(true);

  try {
    const profileRes = await fetch(CORS(`https://api.mojang.com/users/profiles/minecraft/${name}`));
    const profileData = await profileRes.json();
    const parsed = JSON.parse(profileData.contents);
    if (parsed.errorMessage || !parsed.id) throw new Error("Joueur introuvable");

    const uuid = parsed.id;
    const displayName = parsed.name;

    const sessionRes = await fetch(CORS(`https://sessionserver.mojang.com/session/minecraft/profile/${uuid}`));
    const sessionData = await sessionRes.json();
    const sessionParsed = JSON.parse(sessionData.contents);
    const props = sessionParsed.properties;
    const textureProp = props.find(p => p.name === "textures");
    const textureJson = JSON.parse(atob(textureProp.value));
    const skinUrl = textureJson.textures.SKIN.url;

    const imgRes = await fetch(CORS(skinUrl));
    const imgData = JSON.parse(imgRes.contents || "{}");
    const skinBase64 = imgData.contents || imgData;

    const img = new Image();
    img.onload = () => {
      skinImg = img;
      showLoading(false);
      canvas.style.display = "block";
      infoCard.style.display = "block";
      actionBtns.style.display = "flex";
      document.getElementById("playerName").textContent = displayName;
      document.getElementById("playerUUID").textContent = "UUID: " + uuid;
      spawnParticles();
      startAnim();
    };
    img.onerror = () => { showLoading(false); showError("Erreur chargement du skin."); };
    img.src = "data:image/png;base64," + skinBase64;

  } catch(e) {
    showLoading(false);
    showError("Joueur introuvable ou API indisponible.");
  }
}

function drawPart(sx, sy, sw, sh, dx, dy, dw, dh, flipX) {
  if (!skinImg) return;
  ctx.save();
  if (flipX) {
    ctx.translate(dx + dw, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(skinImg, sx, sy, sw, sh, 0, 0, dw, dh);
  } else {
    ctx.drawImage(skinImg, sx, sy, sw, sh, dx, dy, dw, dh);
  }
  ctx.restore();
}

function drawOverlay(sx, sy, sw, sh, dx, dy, dw, dh, flipX) {
  drawPart(sx, sy, sw, sh, dx, dy, dw, dh, flipX);
}

const S = SCALE;
function drawSkin(walkPhase, runPhase, isIdle, isSpin) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let armSwing = 0, legSwing = 0;
  if (!isIdle && !isSpin) {
    const phase = isSpin ? 0 : (animMode === "run" ? runPhase : walkPhase);
    armSwing = Math.sin(phase) * (animMode === "run" ? 0.6 : 0.35);
    legSwing = Math.sin(phase) * (animMode === "run" ? 0.55 : 0.3);
  }

  const CW = canvas.width;
  const headX = CW/2 - 4*S;
  const bodyX = CW/2 - 4*S;
  const headY = 10;
  const bodyY = headY + 8*S;
  const legY = bodyY + 12*S;
  const armW = 4*S, armH = 12*S;
  const legW = 4*S, legH = 12*S;

  function rotAround(drawFn, cx, cy, angle) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.translate(-cx, -cy);
    drawFn();
    ctx.restore();
  }

  rotAround(() => {
    drawPart(20,52, 4,12, CW/2 - 8*S - 2, bodyY, armW, armH);
    drawOverlay(44,52, 4,12, CW/2 - 8*S - 2, bodyY, armW+1, armH+1);
  }, CW/2 - 8*S - 2 + armW/2, bodyY, armSwing);

  rotAround(() => {
    drawPart(40,20, 4,12, CW/2 - 2, bodyY, armW, armH, false);
    drawOverlay(44,36, 4,12, CW/2 - 2, bodyY, armW+1, armH+1);
  }, CW/2 - 2 + armW/2, bodyY, -armSwing);

  rotAround(() => {
    drawPart(4,20, 4,12, CW/2 - 8*S, legY, legW, legH);
    drawOverlay(4,36, 4,12, CW/2 - 8*S, legY, legW+1, legH+1);
  }, CW/2 - 8*S + legW/2, legY, legSwing);

  rotAround(() => {
    drawPart(4,20, 4,12, CW/2 - 1, legY, legW, legH, true);
    drawOverlay(4,36, 4,12, CW/2 - 1, legY, legW+1, legH+1, true);
  }, CW/2 - 1 + legW/2, legY, -legSwing);

  drawPart(20,20, 8,12, bodyX, bodyY, 8*S, 12*S);
  drawOverlay(20,36, 8,12, bodyX, bodyY, 8*S+1, 12*S+1);

  const bobY = isIdle ? Math.sin(animT * 0.04) * 1.5 : (animMode === "run" ? Math.abs(Math.sin(runPhase)) * -3 : 0);
  const headTilt = isIdle ? Math.sin(animT * 0.025) * 0.05 : 0;
  ctx.save();
  ctx.translate(headX + 4*S, headY + bobY);
  ctx.rotate(headTilt);
  ctx.translate(-(headX + 4*S), -(headY + bobY));
  drawPart(8,8, 8,8, headX, headY + bobY, 8*S, 8*S);
  drawOverlay(40,8, 8,8, headX-1, headY + bobY - 1, 8*S+2, 8*S+2);
  ctx.restore();
}

function spawnParticles() {
  for (let i = 0; i < 18; i++) {
    particles.push({
      x: Math.random() * 320,
      y: Math.random() * 400,
      r: Math.random() * 3 + 1,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -Math.random() * 0.8 - 0.3,
      alpha: Math.random() * 0.5 + 0.2,
      color: ["#5b9e3a","#8e5b1f","#4a86a8","#e8d44d","#a85b5b"][Math.floor(Math.random()*5)]
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, 320, 400);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.alpha -= 0.003;
    if (p.y < 0 || p.alpha <= 0) {
      p.x = Math.random() * 320; p.y = 400;
      p.alpha = Math.random() * 0.5 + 0.2;
      p.vy = -Math.random() * 0.8 - 0.3;
    }
    pCtx.save();
    pCtx.globalAlpha = p.alpha;
    pCtx.fillStyle = p.color;
    pCtx.fillRect(Math.round(p.x), Math.round(p.y), p.r * 2, p.r * 2);
    pCtx.restore();
  });
}

function startAnim() {
  if (animRAF) cancelAnimationFrame(animRAF);
  animT = 0;
  function loop() {
    animT++;
    const isIdle = animMode === "idle";
    const isSpin = animMode === "spin";
    if (isSpin) spinAngle += 0.04;
    const walkPhase = animT * 0.12;
    const runPhase = animT * 0.2;
    ctx.save();
    if (isSpin) {
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(Math.sin(spinAngle) * 0.7);
      ctx.translate(-canvas.width / 2, -canvas.height / 2);
    }
    drawSkin(walkPhase, runPhase, isIdle, isSpin);
    ctx.restore();
    updateParticles();
    animRAF = requestAnimationFrame(loop);
  }
  loop();
}

document.getElementById("searchBtn").addEventListener("click", () => {
  searchPlayer(document.getElementById("usernameInput").value.trim());
});
document.getElementById("usernameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") searchPlayer(e.target.value.trim());
});

["btnWalk","btnIdle","btnRun","btnSpin"].forEach(id => {
  document.getElementById(id).addEventListener("click", function() {
    document.querySelectorAll(".actions button").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    animMode = { btnWalk:"walk", btnIdle:"idle", btnRun:"run", btnSpin:"spin" }[id];
    spinAngle = 0;
  });
});
</script>
